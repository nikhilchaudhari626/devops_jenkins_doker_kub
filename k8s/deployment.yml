apiVersion: apps/v1
kind: Deployment
metadata:
  name: Devops

spec:
  replicas: 1

  selector:
    matchLabels:
      app: Devops

  template:
    metadata:
      labels:
        app: Devops

    spec:
      containers:
        - name: Devops
          image: nikhilchaudhari626/Devops:latest

          ports:
            - containerPort: 8080

          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"

            limits:
              memory: "512Mi"
              cpu: "500m"